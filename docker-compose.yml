services:
  mariadb:
    image: mariadb:11.4
    container_name: demandes-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: demandes_db
      MARIADB_USER: demandes_user
      MARIADB_PASSWORD: demandes_pass
      MARIADB_ROOT_PASSWORD: JOSE@007
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: